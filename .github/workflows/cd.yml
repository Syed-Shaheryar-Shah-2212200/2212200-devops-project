name: CD — Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: []   # Remove this line if you want to require CI to pass first

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ubuntu
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -ex
            if ! sudo docker compose version >/dev/null 2>&1; then
              curl -fsSL https://get.docker.com | sudo sh
              sudo usermod -aG docker ubuntu
            fi
            if [ ! -d "$HOME/devops-project" ]; then
              git clone https://github.com/Syed-Shaheryar-Shah-2212200/2212200-devops-project "$HOME/devops-project"
            fi
            cd "$HOME/devops-project"
            git pull origin main || true
            echo "DB_USER=devops_user" > .env.production
            echo "DB_PASSWORD=devops_pass_2212200_prod" >> .env.production
            echo "DB_NAME=devops_db_prod" >> .env.production
            cp .env.production .env
            sudo docker compose -f docker-compose.prod.yml down || true
            sudo docker compose -f docker-compose.prod.yml up -d --build
            sudo docker compose -f docker-compose.prod.yml ps
            echo "Deployed at $(date)"
